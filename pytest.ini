[pytest]
# Pin the test root. A bare `pytest` run from the repo root collects
# test modules outside helixc/tests/ and hits ~51 "import file
# mismatch" collection errors; `pytest helixc/tests/` always
# collected cleanly (4031 tests). `testpaths` makes the bare command
# use that clean path. Explicit paths passed on the command line
# still override this, so the shard / select-test infrastructure
# (test_pytest_shard.py, test_stage32_select_tests.py) is unaffected.
testpaths = helixc/tests
